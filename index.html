<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>Matrix-A</title>
</head>
<style>
.change_color {
	animation: change_color 3s linear 0s infinite;
}
@keyframes change_color {
	0% {color: #ffffff;}
	10% {color: #ffffcc;}
	10% {color: #cccc66;}
	30% {color: #ff3399;}
	40% {color: #cc0000;}
	50% {color: #666600;}
	60% {color: #006633;}
	70% {color: #99cc33;}
	80% {color: #0099ff;}
	90% {color: #66ffff;}
	100%{color: #ffffff;}
}
</style>
<body>
    <center>
        <h1>Hello, world!</h1>
        <h2>by <span class="change_color">YH</span></h2>
    </center>
</body>

</html>
